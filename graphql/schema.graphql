scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

type Film {
    id: ID!
    title: String!
    description: String
    release_year: Int
    length: Int

    critics: [Critics!]! @hasMany
    actors: [Actor!]! @belongsToMany
}

type Critics {
    id: ID!
    score: Float!
    comment: String!
}

type Actor {
    id: ID!
    last_name: String!
    first_name: String!
    birthdate: DateTime
}

type Query {

    film(id: ID! @eq): Film @find

    films(
        title: String @where(operator: "like")
        description: String @where(operator: "like")

        min_year: Int @where(key: "release_year", operator: ">=")

        min_length: Int @where(key: "length", operator: ">=")

        max_length: Int @where(key: "length", operator: "<=")
    ): [Film!]! @paginate(defaultCount: 10)
}